name: 'Release SDK using changesets'
on:
  workflow_call:
    inputs:
      prepare-command:
        description: 'Command to run for project preparation (e.g., installing dependencies).'
        required: false
        type: string
      github-release-files:
        description: A comma-delimited list of glob patterns to identify the local files to attach to the GitHub release.
        type: string
        required: false
        default: ''
      version-command:
        description: 'Command to run for project versioning'
        default: pnpm exec changeset version
        type: string
      publish-command:
        description: 'Command to run for project publishing'
        default: pnpm exec changeset publish
        type: string
      language:
        description: 'Programming language for the project. Supported values are "java", "dotnet", "python", "golang", "flutter" and "php".'
        required: true
        type: string
      language-version:
        description: 'Version of the programming language to setup.'
        required: true
        type: string
      java-version:
        description: 'Version of Java to setup.'
        required: false
        type: string
        default: '11'
      client-id:
        type: string
        required: false
        description: 'GitHub App client ID for release process.'
      appId:
        type: string
        required: false
        description: 'Deprecated: use client-id instead. GitHub App client ID for release process.'
      runner-client-id:
        type: string
        default: ''
        required: false
        description: 'GitHub App ID used to generate an installation token for creating the PR.'
      runnerAppId:
        type: string
        default: ''
        required: false
        description: 'Deprecated: use runner-client-id instead. GitHub App client ID for creating PR.'
      useTrustedPublishing:
        type: boolean
        required: false
        default: false
        description: 'Whether to use trusted publishing for publishing packages'
    secrets:
      APP_PRIVATE_KEY:
        description: 'GitHub App private key to request GitHub token for release process.'
        required: true
      RUNNER_APP_PRIVATE_KEY:
        description: 'GitHub App private key to request GitHub token for creating PR.'
        required: false
      NPM_AUTH_TOKEN:
        description: 'NPM authentication token for publishing packages.'
        required: false

jobs:
  determine-changesets-step:
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.changeset-determine-step.outputs.action }}
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v7

      - name: 'Determine package manager'
        run: |
          if [[ -f "yarn.lock" ]]; then
            echo "Using yarn"
            echo "PACKAGE_MANAGER=yarn" >> $GITHUB_ENV
          else
            echo "Using pnpm"
            echo "PACKAGE_MANAGER=pnpm" >> $GITHUB_ENV
          fi

      - if: ${{ env.PACKAGE_MANAGER == 'pnpm' }}
        name: 'Setup pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: 'true'

      - if: ${{ env.PACKAGE_MANAGER == 'yarn' }}
        name: 'Install dependencies'
        run: yarn install

      - name: 'Install changesets'
        run: 'npm install @changesets/cli --global'

      - name: 'Checkout dx-team-toolkit actions'
        uses: actions/checkout@v7
        with:
          repository: fingerprintjs/dx-team-toolkit
          ref: ${{ job.workflow_sha }}
          path: _dx-toolkit
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: 'Exclude dx-team-toolkit checkout from git'
        run: echo '_dx-toolkit/' >> .git/info/exclude

      - name: Determine changesets step
        id: changeset-determine-step
        uses: ./_dx-toolkit/.github/actions/changeset-determine-step
  create-pr:
    runs-on: ubuntu-latest
    needs: determine-changesets-step
    if: needs.determine-changesets-step.outputs.action == 'pr' && (inputs.runner-client-id != '' || inputs.runnerAppId != '')
    steps:
      - name: 'Validate runner app credentials'
        env:
          RUNNER_APP_PRIVATE_KEY: ${{ secrets.RUNNER_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$RUNNER_APP_PRIVATE_KEY" ]; then
            echo "Error: RUNNER_APP_PRIVATE_KEY secret must be provided when runner-client-id or runnerAppId is set"
            exit 1
          fi

      - name: 'Get token for the GitHub App'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ inputs.runner-client-id || inputs.runnerAppId }}
          private-key: ${{ secrets.RUNNER_APP_PRIVATE_KEY }}

      - name: 'Checkout repository'
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 'Checkout dx-team-toolkit actions'
        uses: actions/checkout@v7
        with:
          repository: fingerprintjs/dx-team-toolkit
          ref: ${{ job.workflow_sha }}
          path: _dx-toolkit
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: 'Exclude dx-team-toolkit checkout from git'
        run: echo '_dx-toolkit/' >> .git/info/exclude

      - name: Setup language
        uses: ./_dx-toolkit/.github/actions/setup-lang
        with:
          language: ${{ inputs.language }}
          language-version: ${{ inputs.language-version }}
          java-version: ${{ inputs.java-version }}

      - name: 'Prepare project'
        if: ${{ inputs.prepare-command != '' }}
        run: ${{ inputs.prepare-command }}

      # Setup PNPM for other projects than node to install changeset globally
      - name: 'Setup pnpm'
        if: ${{ inputs.language != 'node' }}
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: 'true'

      - name: 'Install changesets'
        run: 'pnpm install @changesets/cli --global'

      - name: Create Release PR
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: ${{ inputs.version-command }}
          commit: 'chore(release): changeset created a new release'
          title: 'Release [changeset]'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
  release:
    runs-on: ubuntu-latest
    environment: production
    needs: determine-changesets-step
    if: needs.determine-changesets-step.outputs.action == 'publish' || (inputs.runner-client-id == '' && inputs.runnerAppId == '')
    steps:
      - name: 'Validate app credentials'
        if: ${{ inputs.client-id == '' && inputs.appId == '' }}
        run: |
          echo "Error: either 'client-id' or 'appId' (deprecated) must be provided"
          exit 1

      - name: 'Get token for the GitHub App'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ inputs.client-id || inputs.appId }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 'Checkout repository'
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 'Checkout dx-team-toolkit actions'
        uses: actions/checkout@v7
        with:
          repository: fingerprintjs/dx-team-toolkit
          ref: ${{ job.workflow_sha }}
          path: _dx-toolkit
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: 'Exclude dx-team-toolkit checkout from git'
        run: echo '_dx-toolkit/' >> .git/info/exclude

      - name: Setup language
        uses: ./_dx-toolkit/.github/actions/setup-lang
        with:
          language: ${{ inputs.language }}
          language-version: ${{ inputs.language-version }}
          java-version: ${{ inputs.java-version }}

      - name: 'Prepare project'
        if: ${{ inputs.prepare-command != '' }}
        run: ${{ inputs.prepare-command }}

      # Setup PNPM for other projects than node to install changeset globally
      - name: 'Setup pnpm'
        if: ${{ inputs.language != 'node' }}
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: 'true'

      # Ensure npm 11.5.1 or later is installed for trusted publishing
      - name: Update npm
        if: ${{ inputs.useTrustedPublishing }}
        run: |
          npm i -g npm@^11.5.1 && npm --version

      - name: Enable npm provenance
        if: ${{ inputs.useTrustedPublishing }}
        run: echo "NPM_CONFIG_PROVENANCE=true" >> $GITHUB_ENV
      - name: 'Install changesets'
        run: 'pnpm install @changesets/cli --global'

      - name: Create Release
        id: changesets-release
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: ${{ inputs.publish-command }}
          version: ${{ inputs.version-command }}
          commit: 'chore(release): changeset created a new release'
          title: 'Release [changeset]'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # If useTrustedPublishing is true, use OIDC for npm authentication instead of NPM_TOKEN https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868 by passing an empty string
          NPM_TOKEN: ${{ inputs.useTrustedPublishing && '' || secrets.NPM_AUTH_TOKEN }}

      - name: 'Upload files to GitHub release'
        if: inputs.github-release-files != '' && steps.changesets-release.outputs.published == 'true'
        env:
          PACKAGES: ${{ steps.changesets-release.outputs.publishedPackages }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Expand support for '**'
          shopt -s globstar

          # Convert no match patterns into the empty string to result in upload failures
          shopt -s nullglob
          
          # Check if changeset config has any ignored packages
          CHANGESET_CONFIG_IGNORE=$(jq -r .ignore ./.changeset/config.json | jq 'length')

          # Calculate the tag name for the release of the primary package
          PACKAGE_NAME=$(jq -r .name ./package.json)
          VERSION=$(echo "$PACKAGES" | jq --arg package_name "$PACKAGE_NAME" -r '.[] | select(.name == $package_name) | .version')
          # If there is only one package published, and changeset config has no ignored packages, use the version as the tag name
          if [ "$(echo "$PACKAGES" | jq 'length')" -eq 1 ] && [ "$CHANGESET_CONFIG_IGNORE" -eq 0 ]; then
            TAG="v$VERSION"
          else
            # Changesets uses a different naming convention for multi-package repos
            TAG="${PACKAGE_NAME}@${VERSION}"
          fi

          IFS=',' read -ra GLOB_PATTERNS <<< "${{ inputs.github-release-files }}"
          for pattern in "${GLOB_PATTERNS[@]}"; do
            echo "Uploading files matching the pattern \"$pattern\" to the $TAG release"
            gh release upload "$TAG" $pattern
          done
