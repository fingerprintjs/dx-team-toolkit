name: Create Prerelease Branch and Force Push

on:
  workflow_call:
    inputs:
      branch_name:
        required: true
        type: string
        description: 'Branch to reset'
      client-id:
        type: string
        required: false
        description: 'GitHub App client ID for release process'
      appId:
        type: string
        required: false
        description: 'Deprecated: use client-id instead. GitHub App client ID for release process'
    secrets:
      APP_PRIVATE_KEY:
        description: 'GitHub App token to request GitHub token'
        required: true

jobs:
  create-branch-and-force-push:
    name: 'Create branch from main and force push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 'Validate app credentials'
        if: ${{ inputs.client-id == '' && inputs.appId == '' }}
        run: |
          echo "Error: either 'client-id' or 'appId' (deprecated) must be provided"
          exit 1

      - name: 'Get token for the GitHub App'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ inputs.client-id || inputs.appId }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Create and switch to branch
        run: |
          git checkout -b ${{ inputs.branch_name }} origin/main

      - name: Force push to branch
        run: git push origin ${{ inputs.branch_name }} --force
