name: 'Release Server SDK'
on:
  workflow_call:
    inputs:
      language:
        description: 'Programming language for the project. Supported values are "java", "dotnet", "python", "golang", "flutter" and "php".'
        required: true
        type: string
      language-version:
        description: 'Version of the programming language to setup.'
        required: true
        type: string
      java-version:
        description: 'Version of Java to setup.'
        required: false
        type: string
        default: '11'
      prepare-command:
        description: 'Command to run for project preparation (e.g., installing dependencies).'
        required: false
        type: string
      semantic-release-extra-plugins:
        description: 'Additional plugins to install for the semantic-release action.'
        required: false
        type: string
      client-id:
        type: string
        required: false
        description: 'GitHub App client ID for release process.'
      appId:
        type: string
        required: false
        description: 'Deprecated: use client-id instead. GitHub App client ID for release process.'
    secrets:
      GH_RELEASE_TOKEN:
        description: 'GitHub token with permissions to create releases and perform other necessary operations.'
        required: false
      APP_PRIVATE_KEY:
        description: 'GitHub App token to request GitHub token.'
        required: false
      PYPI_TOKEN:
        description: 'PyPI token used for publishing Python packages. Required only for Python projects.'
        required: false
      NUGET_API_KEY:
        description: 'NuGet API key for publishing .NET packages. Required only for DotNET projects.'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: 'Checkout dx-team-toolkit actions'
        uses: actions/checkout@v7
        with:
          repository: fingerprintjs/dx-team-toolkit
          ref: ${{ github.workflow_sha }}
          path: _dx-toolkit
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: 'Exclude dx-team-toolkit checkout from git'
        run: echo '_dx-toolkit/' >> .git/info/exclude

      - name: Setup language
        uses: ./_dx-toolkit/.github/actions/setup-lang
        with:
          language: ${{ inputs.language }}
          language-version: ${{ inputs.language-version }}
          java-version: ${{ inputs.java-version }}

      - name: 'Prepare project'
        if: ${{ inputs.prepare-command != '' }}
        run: ${{ inputs.prepare-command }}

      - name: 'Validate app credentials'
        if: ${{ inputs.client-id != '' || inputs.appId != '' }}
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [ -z "$APP_PRIVATE_KEY" ]; then
            echo "Error: APP_PRIVATE_KEY secret must be provided when client-id or appId is set"
            exit 1
          fi

      - name: 'Get token for the GitHub App'
        if: ${{ inputs.client-id != '' || inputs.appId != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ inputs.client-id || inputs.appId }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 'Semantic Release'
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            @semantic-release/exec@7.1.0
            @fingerprintjs/conventional-changelog-dx-team@0.2.0
            ${{ inputs.semantic-release-extra-plugins }}
        env:
          GITHUB_TOKEN: ${{ (inputs.client-id != '' || inputs.appId != '') && steps.app-token.outputs.token || secrets.GH_RELEASE_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
