name: 'Update server-side SDK schema'
on:
  workflow_call:
    inputs:
      language:
        description: 'Programming language for the project. Supported values are "java", "dotnet", "python", "golang", "flutter" and "php".'
        required: true
        type: string
      language-version:
        description: 'Version of the programming language to setup.'
        required: true
        type: string
      java-version:
        description: 'Version of Java to setup.'
        required: false
        type: string
        default: '11'
      prepare-command:
        description: 'Command to run for project preparation (e.g., installing dependencies).'
        required: false
        type: string
      generate-command:
        description: 'Command for generating code from OpenAPI schema'
        required: true
        type: string
      tag:
        description: 'Tag for the OpenAPI release.'
        required: true
        type: string
      schema-source:
        description: 'Source of the schema in OpenAPI release artifacts'
        required: false
        default: 'fingerprint-server-api-v4.yaml'
        type: string
      schema-path:
        description: 'Path to the OpenAPI schema.'
        required: true
        type: string
      examples-path:
        description: 'Path to the OpenAPI examples.'
        required: true
        type: string
      client-id:
        type: string
        required: false
        description: 'GitHub App client ID for release process'
      app-id:
        type: string
        required: false
        description: 'Deprecated: use client-id instead. GitHub App client ID for release process'
      repository:
        type: string
        required: true
        description: 'Name of the repository in format'
      owner:
        type: string
        required: false
        description: 'Owner of the repository'
        default: fingerprintjs
      pre-release:
        type: boolean
        required: false
        description: 'Whether to start a pre-release changeset flow'
        default: false
      pre-release-tag:
        type: string
        required: false
        description: 'Tag suffix used for pre-releases'
        default: 'test'
      allowed-scopes:
        description: 'List of change scopes to allow, comma separated. If left empty, all scopes are allowed.'
        required: false
        type: string
        default: ''
      scopes-repository:
        description: 'Repository to source scopes.yaml from, in format of owner/repo. Defaults to the OpenAPI repo.'
        required: false
        type: string
        default: ''
      scopes-config-path:
        description: 'Path to scopes.yaml within scopes-repository'
        required: false
        type: string
        default: 'config/scopes.yaml'
      scopes-ref:
        description: 'Git ref (branch, tag, or SHA) to read scopes-config-path from'
        required: false
        type: string
        default: 'main'
      force:
        description: 'Whether to force update to given tag, even if it was already updated before'
        default: false
        type: boolean
        required: false

    secrets:
      APP_PRIVATE_KEY:
        description: 'GitHub App token to request GitHub token'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 'Validate app credentials'
        if: ${{ inputs.client-id == '' && inputs.app-id == '' }}
        run: |
          echo "Error: either 'client-id' or 'app-id' (deprecated) must be provided"
          exit 1

      - name: 'Get token for the GitHub App'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ inputs.client-id || inputs.app-id }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: '${{ inputs.repository }}'
          owner: '${{ inputs.owner }}'

      - name: 'Checkout'
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ inputs.owner }}/${{ inputs.repository }}

      - name: Setup language
        uses: fingerprintjs/dx-team-toolkit/.github/actions/setup-lang@v1
        with:
          language: ${{ inputs.language }}
          language-version: ${{ inputs.language-version }}
          java-version: ${{ inputs.java-version }}

      - name: 'Setup pnpm'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9
          run_install: true

      - name: 'Install Node'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.language == 'node' && inputs.language-version || 'lts/*' }}
          cache: 'pnpm'

      - name: Set git config
        run: |
          git config --global --add --bool push.autoSetupRemote true

      - name: Update schema
        uses: fingerprintjs/dx-team-toolkit/.github/actions/update-sdk-schema@v1
        with:
          schemaSource: ${{ inputs.schema-source }}
          schemaPath: ${{ inputs.schema-path }}
          examplesPath: ${{ inputs.examples-path }}
          generateCommand: ${{ inputs.generate-command }}
          tag: ${{ inputs.tag }}
          githubToken: '${{ steps.app-token.outputs.token }}'
          preRelease: '${{ inputs.pre-release }}'
          allowedScopes: ${{ inputs.allowed-scopes }}
          scopesRepository: ${{ inputs.scopes-repository }}
          scopesConfigPath: ${{ inputs.scopes-config-path }}
          scopesRef: ${{ inputs.scopes-ref }}
          preReleaseTag: '${{ inputs.pre-release-tag }}'
          force: '${{ inputs.force }}'

      - name: Add & Commit
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: '.'
          github_token: ${{ steps.app-token.outputs.token }}
          message: 'feat: sync OpenAPI schema to ${{ inputs.tag }}'
          push: 'false'

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          title: 'OpenAPI schema sync (${{ inputs.tag }})'
          body: 'Schema sync for [${{ inputs.tag }}](https://github.com/fingerprintjs/fingerprint-pro-server-api-openapi/releases/tag/${{ inputs.tag }}) OpenAPI schema release.'
          token: ${{ steps.app-token.outputs.token }}
          branch: feat/open-api-${{ inputs.tag }}
