name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: production-npm
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@129abb77bf5884e578fcaf1f37628e41622cc371
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      # Ensure npm 11.5.1 or later is installed for trusted publishing
      - name: Update npm
        run: npm i -g npm@^11.5.1 && npm --version

      - name: Install Dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Setup git for tests
        run: git config --global user.email "test@example.com" && git config --global user.name "Test User"

      - name: Test
        run: pnpm test

      - name: Create Release
        uses: changesets/action@c48e67d110a68bc90ccf1098e9646092baacaa87 # v1.6.0
        with:
          publish: pnpm changeset publish
          commit: 'chore(release): changeset created a new release'
          title: 'Release packages [changeset]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
