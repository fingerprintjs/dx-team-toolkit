name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: production-npm
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      # Ensure npm 11.5.1 or later is installed for trusted publishing
      - name: Update npm
        run: npm i -g npm@^11.5.1 && npm --version

      - name: Install Dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Setup git for tests
        run: git config --global user.email "test@example.com" && git config --global user.name "Test User"

      - name: Test
        run: pnpm test

      - name: Create Release
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm changeset publish
          commit: 'chore(release): changeset created a new release'
          title: 'Release packages [changeset]'
          commitMode: 'github-api'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
